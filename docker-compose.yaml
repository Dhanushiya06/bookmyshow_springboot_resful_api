version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql-bookmyshow
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookmyshow
    ports:
      - "3306:3306"
    networks:
      - bookmyshow-net

  app:
    build: .
    container_name: bookmyshow-container
    depends_on:
      - mysql
    ports:
      - "8090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bookmyshow
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - bookmyshow-net

networks:
  bookmyshow-net:
